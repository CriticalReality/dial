<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Square iOS Style Keypad</title>

<style>
:root{
    --bg:#000;
    --text:#fff;
    --secondary:#8e8e93;
    --key:#333336;
    --key-active:#6d6d72;
    --green:#34c759;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.phone{
    width:390px;
    max-width:100vw;
    padding:22px;
}

.display{
    height:110px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    margin-bottom:28px;
}

.number{
    font-size:38px;
    font-weight:300;
    letter-spacing:-1px;
    min-height:48px;
    white-space:nowrap;
    overflow:hidden;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
}

.key{
    position:relative;
    aspect-ratio:1;
    border:none;
    border-radius:24px;
    background:var(--key);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:
        transform .08s ease,
        background .08s ease,
        filter .08s ease;
    transform:scale(1);
}

.key:active,
.key.active{
    background:var(--key-active);
    transform:scale(.94);
}

.digit{
    font-size:42px;
    font-weight:300;
    line-height:1;
}

.letters{
    margin-top:4px;
    font-size:12px;
    font-weight:600;
    letter-spacing:2px;
}

.blank{
    visibility:hidden;
}

.call{
    background:var(--green);
}

.call .digit{
    font-size:42px;
}

.bottom{
    margin-top:18px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
}

.delete{
    background:transparent;
    border:none;
    color:white;
    font-size:17px;
    cursor:pointer;
    opacity:0;
    transition:.15s;
}

.delete.show{
    opacity:1;
}

.delete:active{
    opacity:.5;
}

.label{
    font-size:14px;
    color:#8e8e93;
    text-align:center;
    margin-top:18px;
}
</style>
</head>

<body>

<div class="phone">

    <div class="display">
        <div class="number" id="display"></div>
    </div>

    <div class="grid" id="keys"></div>

    <div class="bottom">
        <div></div>

        <button class="key call">
            <div class="digit">📞</div>
        </button>

        <button class="delete" id="delete">⌫</button>
    </div>

</div>
<script>
const layout = [
["1",""],
["2","ABC"],
["3","DEF"],
["4","GHI"],
["5","JKL"],
["6","MNO"],
["7","PQRS"],
["8","TUV"],
["9","WXYZ"],
["*",""],
["0","+"],
["#",""]
];

const grid = document.getElementById("keys");
const display = document.getElementById("display");
const del = document.getElementById("delete");
const callButton = document.querySelector(".call");

let number = "";
let triggered = false;

layout.forEach(item => {

    const btn = document.createElement("button");
    btn.className = "key";

    btn.innerHTML = `
        <div class="digit">${item[0]}</div>
        <div class="letters">${item[1]}</div>
    `;

    btn.onclick = () => {
        animate(btn);
        clickSound(item[0]);
        number += item[0];
        update();
    };

    grid.appendChild(btn);
});

function update() {

    const formatted = format(number);
    display.textContent = formatted;

    if(number.length){
        del.classList.add("show");
    }else{
        del.classList.remove("show");
    }

    // Secret number
    if(formatted === "888-8888-8888" && !triggered){
        triggered = true;

        startListening();

        setTimeout(()=>{
            number="";
            update();
            triggered=false;
        },500);
    }
}

del.onclick = ()=>{
    number = number.slice(0,-1);
    clickSound("delete");
    update();
};

callButton.onclick = ()=>{
    animate(callButton);
    startListening();
};

function format(value){

    const digits = value.replace(/\D/g,'');

    if(value.startsWith("*") || value.startsWith("#"))
        return value;

    if(digits.length <= 3)
        return digits;

    if(digits.length <= 6)
        return `(${digits.slice(0,3)}) ${digits.slice(3)}`;

    if(digits.length <= 10)
        return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;

    if(digits.length === 11)
        return `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7)}`;

    return digits;
}

function animate(btn){

    btn.classList.add("active");

    setTimeout(()=>{
        btn.classList.remove("active");
    },90);
}

// -----------------------------
// Keypad Sounds
// -----------------------------

const ctx = new (window.AudioContext || window.webkitAudioContext)();

function clickSound(key){

    if(ctx.state === "suspended")
        ctx.resume();

    const frequencies = {
        "1":420,
        "2":460,
        "3":500,
        "4":540,
        "5":580,
        "6":620,
        "7":660,
        "8":700,
        "9":740,
        "0":780,
        "*":360,
        "#":820,
        "delete":300
    };

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type="sine";
    osc.frequency.value = frequencies[key] || 500;

    gain.gain.setValueAtTime(0.001,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.06,ctx.currentTime+0.002);
    gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.06);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime+0.06);
}

// -----------------------------
// Keyboard Support
// -----------------------------

window.addEventListener("keydown",e=>{

    if(/[0-9*#]/.test(e.key)){

        number += e.key;
        update();

        [...document.querySelectorAll(".key")].forEach(k=>{
            const d = k.querySelector(".digit");
            if(d && d.textContent===e.key)
                animate(k);
        });

        clickSound(e.key);
    }

    if(e.key==="Backspace"){
        number = number.slice(0,-1);
        update();
        clickSound("delete");
    }
});

// =============================
// Talking Ben System
// =============================

const audioContext = new (window.AudioContext || window.webkitAudioContext)();

let mediaStream = null;
let source = null;
let analyser = null;
let mediaRecorder = null;

let silenceStart = 0;
let silenceThreshold = 0.01;
let silenceDuration = 2000;
let speechDetected = false;

const soundEffects = [
    "talking-ben-saying-ben.mp3",
    "talking-benn-ughhh.mp3",
    "talking-benn-yes.mp3",
    "talking-bennnn-noo.mp3",
    "talkingg-benn-laughh.mp3"
];

async function startListening(){

    if(mediaStream) return;

    try{

        mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});

        source = audioContext.createMediaStreamSource(mediaStream);

        analyser = audioContext.createAnalyser();
        source.connect(analyser);

        mediaRecorder = new MediaRecorder(mediaStream);
        mediaRecorder.start();

        silenceStart = performance.now();
        speechDetected = false;

        detectSilence();

        console.log("Listening...");

    }catch(err){

        console.error(err);
    }
}

function stopListening(){

    if(mediaRecorder && mediaRecorder.state!=="inactive")
        mediaRecorder.stop();

    if(source)
        source.disconnect();

    if(analyser)
        analyser.disconnect();

    if(mediaStream){
        mediaStream.getTracks().forEach(track=>track.stop());
    }

    mediaStream = null;
    source = null;
    analyser = null;
}

function detectSilence(){

    if(!analyser) return;

    const data = new Uint8Array(analyser.frequencyBinCount);

    analyser.getByteTimeDomainData(data);

    const rms = calculateRMS(data);

    if(rms < silenceThreshold){

        const now = performance.now();

        if(now - silenceStart > silenceDuration){

            if(speechDetected){

                playRandomSoundEffect();

                speechDetected = false;

                silenceStart = now;
            }

        }

    }else{

        speechDetected = true;
        silenceStart = performance.now();
    }

    requestAnimationFrame(detectSilence);
}

function calculateRMS(data){

    let sum = 0;

    for(let i=0;i<data.length;i++){

        const n = data[i]/128 - 1;
        sum += n*n;
    }

    return Math.sqrt(sum/data.length);
}

function playRandomSoundEffect(){

    const file = soundEffects[Math.floor(Math.random()*soundEffects.length)];

    const audio = new Audio(file);

    audio.play().catch(console.error);
}

update();
</script>

</body>
</html>
